name: Rainbow AI Build
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build Smartly
        run: |
          # 1. Naya fresh project banao
          flutter create temp_app --org com.sujit.rainbowai
          
          # 2. Aapki 'main.dart' file ko dhoondo aur copy karo (Kahin bhi ho)
          # Ye command poore repo mein main.dart dhoond kar temp_app mein daal degi
          find . -name "main.dart" -not -path "./temp_app/*" -exec cp {} temp_app/lib/main.dart \;
          
          # 3. Zaroori packages add karo
          cd temp_app
          flutter pub add signature http
          
          # 4. APK banao
          flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: RainbowAI-Success
          path: temp_app/build/app/outputs/flutter-apk/app-release.apk

name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      
      - name: Build From Scratch
        run: |
          # Naya project banao
          flutter create my_app --org com.sujit.rainbowai
          # Hamara main.dart copy karo (Jo aapne pehle hi repo mein rakha hai)
          cp mobile-app/lib/main.dart my_app/lib/main.dart
          # Dependencies add karo
          cd my_app
          flutter pub add signature http
          # Build karo
          flutter build apk --release --no-tree-shake-icons
          
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Real-Rainbow-AI
          path: my_app/build/app/outputs/flutter-apk/app-release.apk

name: Build Rainbow AI APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build App
        run: |
          # 1. Hamara coloring code save karo
          cp mobile-app/lib/main.dart custom_code.dart
          
          # 2. Ek naya fresh app banao
          flutter create my_final_app --org com.sujit.rainbowai
          
          # 3. Demo code hata kar hamara code dalo
          rm my_final_app/lib/main.dart
          cp custom_code.dart my_final_app/lib/main.dart
          
          # 4. Coloring tool (signature) aur Internet add karo
          cd my_final_app
          flutter pub add signature http
          
          # 5. APK banao
          flutter build apk --release --no-tree-shake-icons

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: RainbowAI-Real-App
          path: my_final_app/build/app/outputs/flutter-apk/app-release.apk
